production:
  primary: &primary_production
    url: <%= ENV["DATABASE_URL"] %>
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

  queue:
    <<: *primary_production

development:
  primary:
    database: famdish_backend_rails_development
    host: localhost
    username: yuki
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

  queue:
    <<: *primary_production
